
# El webhook de WhatsApp lo llama Meta SIN JWT. Tiene que quedar siempre con
# verify_jwt = false, si no Meta recibe 401 y el bot "deja de leer mensajes".
[functions.wa-webhook]
enabled = true
verify_jwt = false

[functions.alerta-30min]
enabled = true
verify_jwt = true
import_map = "./functions/alerta-30min/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/alerta-30min/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/alerta-30min/*.html" ]
